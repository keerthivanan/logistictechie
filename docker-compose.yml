services:

  # ─── Backend (FastAPI + Neon DB) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cargolink-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - cargolink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cargolink-frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    networks:
      - cargolink-network

  # ─── Redis (caching) ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cargolink-redis
    restart: always
    networks:
      - cargolink-network

# NOTE: n8n is hosted separately by your VPS provider
# Access at: https://n8n.srv1520651.hstgr.cloud

networks:
  cargolink-network:
    driver: bridge
