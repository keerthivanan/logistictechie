services:

  # ─── Backend (FastAPI + Neon DB) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cargolink-backend
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.cargolink-api.rule=Host(`api.cargolink.sa`)
      - traefik.http.routers.cargolink-api.entrypoints=web,websecure
      - traefik.http.routers.cargolink-api.tls=true
      - traefik.http.routers.cargolink-api.tls.certresolver=mytlschallenge
      - traefik.http.services.cargolink-api.loadbalancer.server.port=8000
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - cargolink-network
      - n8n_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cargolink-frontend
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.cargolink-web.rule=Host(`cargolink.sa`) || Host(`www.cargolink.sa`)
      - traefik.http.routers.cargolink-web.entrypoints=web,websecure
      - traefik.http.routers.cargolink-web.tls=true
      - traefik.http.routers.cargolink-web.tls.certresolver=mytlschallenge
      - traefik.http.services.cargolink-web.loadbalancer.server.port=3000
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    networks:
      - cargolink-network
      - n8n_default

  # ─── Redis (caching) ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cargolink-redis
    restart: always
    networks:
      - cargolink-network

networks:
  cargolink-network:
    driver: bridge
  n8n_default:
    external: true
